services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ota-flight-booking:phase16
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - ota

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ota

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ota_db
      MYSQL_USER: ota_user
      MYSQL_PASSWORD: ota_password
      MYSQL_ROOT_PASSWORD: root_password_change_me
    ports:
      - "33066:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password_change_me"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ota

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "63790:6379"
    volumes:
      - redis_data:/data
    networks:
      - ota

  horizon:
    image: ota-flight-booking:phase16
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - app
      - redis
      - mysql
    command: php artisan horizon
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - ota

  reverb:
    image: ota-flight-booking:phase16
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - app
      - redis
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    ports:
      - "8081:8081"
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - ota

  scheduler:
    image: ota-flight-booking:phase16
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - app
      - redis
      - mysql
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - ota

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - ota

volumes:
  mysql_data:
  redis_data:

networks:
  ota:
    driver: bridge
